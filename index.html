<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta
    name="description"
    content="Portfólio da Giz, oficina editorial especializada em livros, revistas e projetos especiais."
  >
  <title>GIZ - Portfólio</title>

  <link rel="stylesheet" href="https://use.typekit.net/ccx3zve.css">
  <link rel="stylesheet" href="portfolio.css">
</head>
<body class="portfolio-page">
  <main class="layout" aria-label="Portfólio Giz">
    <section class="left" id="left" aria-label="Grid de projetos e visualização ampliada">
      <div class="grid-view" id="grid-view">
        <div class="grid" id="grid" role="list"></div>
      </div>

      <section
        class="viewer-shell"
        id="viewer-shell"
        aria-label="Visualização do projeto"
        hidden
      ></section>
    </section>

    <aside class="panel" aria-label="Navegação e informações">
      <nav class="menu" aria-label="Navegação principal">
        <img
          class="menu-logo"
          src="assets/logo-giz-horizontal.png"
          alt="GIZ"
          onerror="this.style.display='none'"
        >
        <div class="menu-nav" id="menu-nav"></div>
      </nav>

      <section class="panel-content" id="panel" aria-live="polite"></section>
    </aside>
  </main>

  <div id="dossie-view" class="dossie-view" hidden></div>

  <script src="portfolio.config.js"></script>
  <script src="backend.config.js"></script>
  <script src="app_portfolio.js"></script>
</body>
</html>
