<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GIZ Auth</title>
  <link rel="stylesheet" href="https://use.typekit.net/ccx3zve.css">
  <style>
    :root {
      --bg: #f4f1e8;
      --paper: #fffdf8;
      --ink: #171717;
      --muted: #6b6b6b;
      --line: rgba(23, 23, 23, 0.14);
      --accent: #145c33;
      --danger: #9d2b2b;
      --font: laca-variable, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: var(--font);
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(20, 92, 51, 0.08), transparent 28%),
        linear-gradient(180deg, #f8f5ee 0%, var(--bg) 100%);
    }

    .card {
      width: min(100%, 620px);
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--paper);
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.05);
    }

    .kicker {
      margin: 0 0 8px;
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    h1 {
      margin: 0 0 12px;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
    }

    .status {
      margin-top: 18px;
      color: var(--ink);
    }

    .status.is-error {
      color: var(--danger);
    }
  </style>
</head>
<body>
  <main class="card">
    <p class="kicker">GIZ</p>
    <h1>Confirmando acesso</h1>
    <p>Estamos validando seu link de acesso e redirecionando para a proxima etapa.</p>
    <p class="status" id="status">Iniciando...</p>
  </main>

  <script src="../../backend.config.js?v=20260316l"></script>
  <script>
    (function () {
      var statusNode = document.getElementById("status");
      var backend = window.GIZ_BACKEND_CONFIG || {};
      var params = new URLSearchParams(window.location.search);
      var tokenHash = params.get("token_hash");
      var type = params.get("type") || "magiclink";
      var redirectTo = params.get("redirect_to") || (window.location.origin + "/admin");

      if (!backend.url || !backend.anonKey) {
        statusNode.textContent = "Backend config ausente.";
        statusNode.classList.add("is-error");
        return;
      }

      if (!tokenHash) {
        statusNode.textContent = "Token do magic link ausente.";
        statusNode.classList.add("is-error");
        return;
      }

      statusNode.textContent = "Validando token...";

      fetch(backend.url + "/auth/v1/verify", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          apikey: backend.anonKey
        },
        body: JSON.stringify({
          token_hash: tokenHash,
          type: type
        })
      })
        .then(function (response) {
          return response.json().then(function (payload) {
            if (!response.ok) {
              throw new Error(payload.msg || payload.error_description || "falha ao verificar token");
            }
            return payload;
          });
        })
        .then(function (payload) {
          var accessToken = payload.access_token || payload.session?.access_token;
          var refreshToken = payload.refresh_token || payload.session?.refresh_token;
          var email = payload.user?.email || payload.session?.user?.email || "";

          if (!accessToken || !refreshToken) {
            throw new Error("A verificacao nao retornou uma sessao completa.");
          }

          var nextUrl = redirectTo +
            "#access_token=" + encodeURIComponent(accessToken) +
            "&refresh_token=" + encodeURIComponent(refreshToken) +
            "&email=" + encodeURIComponent(email);

          statusNode.textContent = "Acesso confirmado. Redirecionando...";
          window.location.replace(nextUrl);
        })
        .catch(function (error) {
          statusNode.textContent = error.message;
          statusNode.classList.add("is-error");
        });
    })();
  </script>
</body>
</html>
