<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GIZ Redefinir Senha</title>
  <link rel="stylesheet" href="https://use.typekit.net/ccx3zve.css">
  <style>
    :root {
      --bg: #f4f1e8;
      --paper: #fffdf8;
      --ink: #171717;
      --muted: #6b6b6b;
      --line: rgba(23, 23, 23, 0.14);
      --accent: #145c33;
      --danger: #9d2b2b;
      --font: laca-variable, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: var(--font);
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(20, 92, 51, 0.08), transparent 28%),
        linear-gradient(180deg, #f8f5ee 0%, var(--bg) 100%);
    }

    .card {
      width: min(100%, 620px);
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--paper);
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.05);
    }

    .kicker {
      margin: 0 0 8px;
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    h1 {
      margin: 0 0 12px;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
    }

    form {
      display: grid;
      gap: 12px;
      margin-top: 22px;
    }

    label {
      display: grid;
      gap: 8px;
      font-size: 13px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
    }

    input,
    button {
      font: inherit;
    }

    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      padding: 12px 14px;
      color: var(--ink);
    }

    button {
      appearance: none;
      border: 1px solid var(--accent);
      border-radius: 999px;
      padding: 11px 18px;
      background: var(--accent);
      color: white;
      cursor: pointer;
    }

    button[disabled] {
      opacity: 0.6;
      cursor: wait;
    }

    .status {
      margin-top: 18px;
      color: var(--ink);
    }

    .status.is-error {
      color: var(--danger);
    }
  </style>
</head>
<body>
  <main class="card">
    <p class="kicker">GIZ</p>
    <h1>Definir senha</h1>
    <p>Crie uma nova senha para acessar o painel editorial com login direto.</p>

    <form id="reset-form">
      <label for="password">
        Nova senha
        <input id="password" type="password" autocomplete="new-password" required>
      </label>
      <label for="password-confirm">
        Confirmar senha
        <input id="password-confirm" type="password" autocomplete="new-password" required>
      </label>
      <button id="submit-button" type="submit">Salvar senha</button>
    </form>

    <p class="status" id="status">Aguardando token de recuperação...</p>
  </main>

  <script src="../../backend.config.js?v=20260316w"></script>
  <script>
    (function () {
      var backend = window.GIZ_BACKEND_CONFIG || {};
      var statusNode = document.getElementById("status");
      var form = document.getElementById("reset-form");
      var passwordInput = document.getElementById("password");
      var confirmInput = document.getElementById("password-confirm");
      var submitButton = document.getElementById("submit-button");
      var hash = new URLSearchParams(window.location.hash.slice(1));
      var accessToken = hash.get("access_token");

      if (!backend.url || !backend.anonKey) {
        statusNode.textContent = "Backend config ausente.";
        statusNode.classList.add("is-error");
        submitButton.disabled = true;
        return;
      }

      if (!accessToken) {
        statusNode.textContent = "Token de recuperação ausente ou expirado.";
        statusNode.classList.add("is-error");
        submitButton.disabled = true;
        return;
      }

      statusNode.textContent = "Defina a nova senha e confirme para continuar.";

      form.addEventListener("submit", function (event) {
        event.preventDefault();

        var password = String(passwordInput.value || "");
        var confirmation = String(confirmInput.value || "");

        if (!password || password.length < 8) {
          statusNode.textContent = "A senha precisa ter ao menos 8 caracteres.";
          statusNode.classList.add("is-error");
          return;
        }

        if (password !== confirmation) {
          statusNode.textContent = "As senhas não conferem.";
          statusNode.classList.add("is-error");
          return;
        }

        submitButton.disabled = true;
        submitButton.textContent = "Salvando...";
        statusNode.textContent = "Atualizando senha...";
        statusNode.classList.remove("is-error");

        fetch(backend.url + "/auth/v1/user", {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
            apikey: backend.anonKey,
            Authorization: "Bearer " + accessToken
          },
          body: JSON.stringify({
            password: password
          })
        })
          .then(function (response) {
            return response.json().then(function (payload) {
              if (!response.ok) {
                throw new Error(payload.msg || payload.error_description || "falha ao atualizar senha");
              }
              return payload;
            });
          })
          .then(function () {
            statusNode.textContent = "Senha atualizada. Redirecionando para o admin...";
            window.location.replace(window.location.origin + "/admin#access_token=" + encodeURIComponent(accessToken));
          })
          .catch(function (error) {
            statusNode.textContent = error.message;
            statusNode.classList.add("is-error");
            submitButton.disabled = false;
            submitButton.textContent = "Salvar senha";
          });
      });
    })();
  </script>
</body>
</html>
